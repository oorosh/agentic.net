name: Pack and Publish NuGet

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to NuGet.org"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Agentic.NET.sln

      - name: Build
        run: dotnet build Agentic.NET.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Agentic.Tests/Agentic.Tests.csproj -c Release --no-build --nologo

      - name: Pack
        run: dotnet pack Agentic.NET.csproj -c Release --no-build -o artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg

      - name: Publish to NuGet.org
        if: >-
          (startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish == true)) &&
          secrets.NUGET_API_KEY != ''
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
